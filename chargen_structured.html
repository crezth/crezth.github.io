<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashes Without Number — Character Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Cabin+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --p:#f5ead8;--p2:#ede0c4;--ink:#2a1f0e;--ink2:#5c4a2a;--rust:#8b3a1a;--rust2:#c4561f;--dust:#9e8a6a;--faded:#c9b89a;--grn:#2d4a2d;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1410;color:var(--ink);font-family:'Special Elite',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
h1{font-family:'Rye',serif;color:var(--p);font-size:28px;letter-spacing:3px;margin-bottom:4px;text-align:center;}
.subtitle{font-family:'Cabin Condensed',sans-serif;color:var(--dust);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;text-align:center;}
.app{background:var(--p);border:3px solid var(--ink2);border-radius:2px;width:100%;max-width:900px;position:relative;overflow:hidden;}
.app::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(90,60,20,0.07) 27px,rgba(90,60,20,0.07) 28px);pointer-events:none;z-index:0;}
.app>*{position:relative;z-index:1;}
.step-bar{background:var(--ink);padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:4px solid var(--rust);}
.step-pip{font-family:'Cabin Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:1px;color:var(--dust);background:transparent;border:1px solid var(--ink2);cursor:default;}
.step-pip.active{background:var(--rust);color:var(--p);border-color:var(--rust);}
.step-pip.done{background:var(--grn);color:var(--p);border-color:var(--grn);}
.step-content{padding:16px 20px;min-height:400px;}
.sec{font-family:'Rye',serif;font-size:14px;color:var(--rust);letter-spacing:2px;border-bottom:2px solid var(--rust);padding-bottom:2px;margin:14px 0 8px;}
.sec:first-child{margin-top:0;}
.desc{font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:10px;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.col{flex:1;min-width:120px;}
label{font-family:'Cabin Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:2px;}
input[type=text],input[type=number],select,textarea{font-family:'Special Elite',serif;font-size:13px;color:var(--ink);background:var(--p2);border:1.5px solid var(--ink2);border-radius:1px;padding:5px 8px;width:100%;}
textarea{resize:vertical;min-height:60px;}
select{cursor:pointer;}
input[type=number]{width:60px;}
.btn{font-family:'Cabin Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:7px 18px;border:1.5px solid var(--rust);background:var(--rust);color:var(--p);border-radius:1px;cursor:pointer;margin-top:6px;}
.btn:hover{background:var(--rust2);}
.btn.sec-btn{background:var(--p2);color:var(--ink);border-color:var(--ink2);}
.btn.sec-btn:hover{background:var(--faded);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.nav-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:10px;border-top:1px solid var(--faded);}
.sbox{background:var(--p2);border:1.5px solid var(--ink2);border-radius:1px;padding:6px 8px;text-align:center;}
.sval{font-family:'Rye',serif;font-size:20px;color:var(--ink);display:block;}
.smod{font-size:11px;color:var(--ink2);}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.pick-card{background:var(--p2);border:1.5px solid var(--faded);border-radius:1px;padding:8px;cursor:pointer;transition:border-color 0.15s;}
.pick-card:hover{border-color:var(--rust2);}
.pick-card.selected{border-color:var(--rust);background:#f0dfc0;box-shadow:inset 0 0 0 1px var(--rust);}
.pick-card .pname{font-family:'Rye',serif;font-size:11px;color:var(--rust);margin-bottom:2px;}
.pick-card .pdesc{font-size:10px;color:var(--ink2);line-height:1.4;}
.pick-card.disabled{opacity:0.35;cursor:not-allowed;pointer-events:none;}
.skill-tag{display:inline-block;font-family:'Cabin Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;background:var(--rust);color:var(--p);padding:1px 5px;border-radius:1px;margin:1px 2px;}
.skill-tag.g{background:var(--grn);}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.tbl th{font-family:'Cabin Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--rust);text-align:left;border-bottom:1px solid var(--rust);padding:2px 4px;}
.tbl td{padding:3px 4px;border-bottom:1px dotted var(--faded);color:var(--ink2);}
.warn{background:#f8e8d0;border-left:3px solid var(--rust2);padding:6px 10px;font-size:11px;color:var(--rust);margin:8px 0;line-height:1.5;}
.note{font-size:10px;color:var(--dust);font-family:'Cabin Condensed',sans-serif;letter-spacing:1px;margin-top:4px;}
.fb{background:var(--p2);border-left:3px solid var(--rust);padding:5px 8px;margin-bottom:5px;}
.fn{font-family:'Rye',serif;font-size:12px;color:var(--rust);}
.fd{font-size:11px;color:var(--ink2);line-height:1.5;margin-top:2px;}
.checkbox-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:12px;color:var(--ink2);}
.checkbox-row input[type=checkbox]{accent-color:var(--rust);}
.skill-summary{display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;margin:8px 0;}
.skill-line{display:flex;align-items:center;justify-content:space-between;border-bottom:1px dotted var(--faded);padding:2px 0;font-size:12px;}
.skill-line .sn{color:var(--ink2);}
.skill-line .sr{font-family:'Cabin Condensed',sans-serif;font-size:11px;font-weight:700;padding:0 4px;border-radius:1px;min-width:20px;text-align:center;border:1px solid var(--faded);color:var(--dust);background:var(--p2);}
.skill-line .sr.r0{color:var(--rust2);border-color:var(--rust2);}
.skill-line .sr.r1{color:var(--ink);border-color:var(--ink2);}
.eq-item{display:flex;align-items:baseline;justify-content:space-between;border-bottom:1px dotted var(--faded);padding:2px 0;font-size:12px;}
.eq-item .gn{color:var(--ink);flex:1;}
.eq-item .ge{font-family:'Cabin Condensed',sans-serif;font-size:10px;color:var(--dust);letter-spacing:1px;margin-left:6px;}
.roll-btn{font-family:'Cabin Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border:1px solid var(--rust2);background:var(--p2);color:var(--rust);border-radius:1px;cursor:pointer;}
.roll-btn:hover{background:var(--rust);color:var(--p);}
.hidden{display:none!important;}
</style>
</head>
<body>

<h1>Ashes Without Number</h1>
<div class="subtitle">Character Generator</div>

<div class="app" id="app">
  <div class="step-bar" id="step-bar"></div>
  <div class="step-content" id="step-content"></div>
</div>

function mod(score){
  if(score<=3)return -2;
  if(score<=7)return -1;
  if(score<=13)return 0;
  if(score<=17)return 1;
  return score>=18?2:0;
}
function modStr(m){return m>=0?'+'+m:''+m;}
function roll(n,d){let t=0;for(let i=0;i<n;i++)t+=Math.floor(Math.random()*d)+1;return t;}

function getAttr(a){return Math.min(18, C.attrs[a] + C.attrBonuses[a]);}
function getMod(a){
  let s = getAttr(a);
  let m = mod(s);
  // Prodigy override
  if(C.edges.includes('prodigy') && C.prodigyAttr===a) { s=18; m=3; }
  // Beacon of Hope CHA bonus
  if(a==='CHA' && C.edges.includes('beacon')) m = Math.min(2, m+1);
  return m;
}
function getScore(a){
  if(C.edges.includes('prodigy') && C.prodigyAttr===a) return 18;
  return getAttr(a);
}
function getSkillLevel(sk){
  return C.skills[sk] !== undefined ? C.skills[sk] : -1;
}
function totalModifiers(){
  return ATTRS.reduce((s,a)=>s+getMod(a),0);
}
function isUnderdog(){ return totalModifiers() <= -1; }
function edgeCount(){
  let n = 2;
  if(isUnderdog()) n++;
  return n;
}

function initSkills(){
  C.skills = {};
  C.skillOrigins = [];
}

function grantSkill(sk, origin){
  let cur = getSkillLevel(sk);
  if(cur < 0){
    C.skills[sk] = 0;
    C.skillOrigins.push(origin+': '+sk+'-0');
    return sk;
  } else if(cur === 0){
    C.skills[sk] = 1;
    C.skillOrigins.push(origin+': '+sk+'-0 → '+sk+'-1');
    return sk;
  } else {
    // already at 1, need free pick - return null to signal
    return null;
  }
}

function getAllEdges(){
  let all = [];
  if(C.campaignEdges.universal) all = all.concat(EDGES_UNIVERSAL);
  if(C.campaignEdges.mutant) all = all.concat(EDGES_MUTANT);
  if(C.campaignEdges.deadlands) all = all.concat(EDGES_DEADLANDS);
  if(C.campaignEdges.afterfall) all = all.concat(EDGES_AFTERFALL);
  return all;
}

function getEdgeById(id){
  return getAllEdges().find(e=>e.id===id) || EDGES_UNIVERSAL.concat(EDGES_MUTANT,EDGES_DEADLANDS,EDGES_AFTERFALL).find(e=>e.id===id);
}

function getFocusById(id){return FOCI.find(f=>f.id===id);}

function focusPicks(){
  let n = 1;
  C.edges.forEach(eid=>{if(eid==='focused')n++;});
  return n;
}

// HP calculation
function getHP(){
  let conMod = getMod('CON');
  let htk = C.edges.includes('hardtokill');
  let perDie = htk ? 2 : 0;
  // At level 1: 1d6 + perDie + conMod, minimum 1
  // We'll use an average for the generator (user can reroll)
  // Actually let's roll it
  let total = 0;
  for(let i=0;i<C.level;i++){
    let r = roll(1,6) + perDie + conMod;
    if(r<1)r=1;
    total += r;
  }
  return Math.max(1, total);
}

function getAtkBonus(){
  if(C.edges.includes('ontarget')) return C.level;
  return Math.floor(C.level/2);
}

function getSave(base){
  return 16 - C.level;
}

function getPhysSave(){
  let s = getSave();
  let m = Math.max(getMod('STR'), getMod('CON'));
  return {target: 16-C.level, mod: m};
}
function getEvasionSave(){
  let m = Math.max(getMod('INT'), getMod('DEX'));
  return {target: 16-C.level, mod: m};
}
function getMentalSave(){
  let m = Math.max(getMod('WIS'), getMod('CHA'));
  return {target: 16-C.level, mod: m};
}

function getMaxStrain(){
  let base = getScore('CON');
  // Natural Immunity
  let niLvl = 0;
  C.foci.forEach(f=>{if(f.id==='natimmunity')niLvl=f.level;});
  if(niLvl>=1) base+=2;
  if(niLvl>=2) base+=2;
  // Iron Stomach level 2
  let isLvl = 0;
  C.foci.forEach(f=>{if(f.id==='ironstomach')isLvl=f.level;});
  if(isLvl>=2) base+=2;
  return base;
}

function getEncReadied(){ return Math.floor(getScore('STR')/2); }
function getEncStowed(){ return getScore('STR'); }

function renderStepBar(){
  const bar = document.getElementById('step-bar');
  bar.innerHTML = STEPS.map((s,i)=>{
    let cls = 'step-pip';
    if(i < currentStep) cls += ' done';
    if(i === currentStep) cls += ' active';
    return `<div class="${cls}">${i+1}. ${s}</div>`;
  }).join('');
}

function render(){
  renderStepBar();
  const el = document.getElementById('step-content');
  switch(currentStep){
    case 0: renderStep1(el); break;
    case 1: renderStep2(el); break;
    case 2: renderStep3(el); break;
    case 3: renderStep4(el); break;
    case 4: renderStep5(el); break;
    case 5: renderStep6(el); break;
  }
}

function nav(html){
  let prev = currentStep > 0 ? `<button class="btn sec-btn" onclick="goStep(${currentStep-1})">Back</button>` : '<span></span>';
  let next = currentStep < STEPS.length-1 ? `<button class="btn" onclick="goStep(${currentStep+1})">Next</button>` : '';
  return `<div class="nav-row">${prev}${next}</div>`;
}

function goStep(n){
  // Save current step state before leaving
  saveCurrentStep();
  currentStep = n;
  render();
  window.scrollTo(0, 0);
}

function saveCurrentStep(){
  switch(currentStep){
    case 0: saveStep1(); break;
    case 1: saveStep2(); break;
    case 2: saveStep3(); break;
    case 3: saveStep4(); break;
    case 4: saveStep5(); break;
  }
}

function skillSelect(id, options, selected){

  let opts = [...new Set(options)];
  let html = `<select id="${id}">`;

        html += `<option value="${s}" ${selected===s?'selected':''}>${s} (Any Combat)</option>`;
      });
    } else {
      html += `<option value="${o}" ${selected===o?'selected':''}>${o}</option>`;
    }
  });
  html += `</select>`;
  return html;
}

function renderAnySkillResolvers(prefix){

function rollBackground(){

function setBgMethod(v){

function useQuickSkills(){
  let bg = BACKGROUNDS[C.bgIndex];
  // Quick skills might be "Any Combat" - resolve to first combat skill
  let qs = bg.quickSkills.map(s => {
    if(s==='Any Combat') return 'Punch';
    if(s==='Any Skill') return 'Survive';
    return s;
  });
  C._bgPick1 = qs[0];
  C._bgPick2 = qs[1] || '';
  render();
}

function rollBgGrowth(){
  if(!C._bgRolls) C._bgRolls=[];
  if(C._bgRolls.length>=3) return;
  let bg = BACKGROUNDS[C.bgIndex];
  let d = roll(1,6);
  let result = bg.growth[d-1];
  C._bgRolls.push({table:'Growth',die:d,result:result});
  render();
}

function rollBgLearning(){
  if(!C._bgRolls) C._bgRolls=[];
  if(C._bgRolls.length>=3) return;
  let bg = BACKGROUNDS[C.bgIndex];
  let d = roll(1,8);
  let result = bg.learning[d-1];
  C._bgRolls.push({table:'Learning',die:d,result:result});
  render();
}

function saveStep2(){
  if(C.bgIndex < 0) return;
  let bg = BACKGROUNDS[C.bgIndex];

  // Reset skills and origins
  initSkills();
  C.attrBonuses = {STR:0,DEX:0,CON:0,INT:0,WIS:0,CHA:0};

  // Free skill
  let free = bg.freeSkill;
  if(free === 'Any Combat') free = 'Punch'; // default
  if(free === 'Any Skill') free = 'Survive';
  grantSkill(free, bg.name+' free skill');

  if(C.bgMethod === 'pick'){
    let el1 = document.getElementById('bgPick1');
    let el2 = document.getElementById('bgPick2');
    C._bgPick1 = el1 ? el1.value : C._bgPick1;
    C._bgPick2 = el2 ? el2.value : C._bgPick2;
    if(C._bgPick1) grantSkill(C._bgPick1, bg.name+' learning pick 1');
    if(C._bgPick2) grantSkill(C._bgPick2, bg.name+' learning pick 2');
  } else {
    // Process rolls
    (C._bgRolls||[]).forEach((r,i)=>{
      let result = r.result;
      if(result === '+1 Any Stat'){
        // Default to STR, user can reassign
        C.attrBonuses.STR += 1;
        C.skillOrigins.push(`${bg.name} growth roll ${i+1}: +1 STR`);
      } else if(result === '+2 Physical'){
        C.attrBonuses.STR += 2;
        C.skillOrigins.push(`${bg.name} growth roll ${i+1}: +2 STR`);
      } else if(result === '+2 Mental'){
        C.attrBonuses.INT += 2;
        C.skillOrigins.push(`${bg.name} growth roll ${i+1}: +2 INT`);
      } else if(result === 'Any Skill'){
        grantSkill('Survive', bg.name+' roll '+r.table);
      } else if(result === 'Any Combat'){
        grantSkill('Punch', bg.name+' roll '+r.table);
      } else {
        grantSkill(result, bg.name+' roll '+r.table);
      }
    });
  }
}

// ── STEP 3: EDGES ────────────────────────────────────────────

function renderStep3(el){
  let nEdges = edgeCount();
  let html = `<div class="sec">Step 3 — Edges (pick ${nEdges})</div>
  <div class="desc">Every PC picks ${nEdges} Edges at creation.${isUnderdog()?' <strong>Underdog Rule active:</strong> bonus Edge granted (total modifiers ≤ -1).':''}</div>`;

  if(C.edges.includes('prodigy')){
    html += `<div class="warn">Prodigy: pick a non-CON attribute to set to 18 (+3 modifier).
    <select id="prodigyAttr" onchange="C.prodigyAttr=this.value">
      <option value="">— choose —</option>
      ${['STR','DEX','INT','WIS','CHA'].map(a=>`<option value="${a}" ${C.prodigyAttr===a?'selected':''}>${ATTR_NAMES[a]}</option>`).join('')}
    </select></div>`;
  }

  let allEdges = getAllEdges();
  let groups = [
    {label:'Universal',edges:EDGES_UNIVERSAL,show:C.campaignEdges.universal},
    {label:'Mutant Wasteland',edges:EDGES_MUTANT,show:C.campaignEdges.mutant},
    {label:'Deadlands',edges:EDGES_DEADLANDS,show:C.campaignEdges.deadlands},
    {label:'After the Fall',edges:EDGES_AFTERFALL,show:C.campaignEdges.afterfall},
  ];

  groups.forEach(g=>{
    if(!g.show) return;
    html += `<div class="sec" style="font-size:11px;">${g.label} Edges</div><div class="pick-grid">`;
    g.edges.forEach(edge=>{
      let sel = C.edges.includes(edge.id) ? 'selected' : '';
      let dis = '';
      // Can't pick same edge twice (unless repeatable)
      if(!edge.repeatable && C.edges.includes(edge.id) && C.edges.filter(e=>e===edge.id).length >= 1){
        // It's already selected, allow toggle off
      }
      // Prodigy can't be taken with underdog
      if(edge.id==='prodigy' && isUnderdog()) dis = 'disabled';
      // Mutaccel requires mutant
      if(edge.id==='mutaccel' && !C.edges.includes('mutant')) dis = 'disabled';

      html += `<div class="pick-card ${sel} ${dis}" onclick="toggleEdge('${edge.id}')">
        <div class="pname">${edge.name}</div>
        <div class="pdesc">${edge.desc}</div>
      </div>`;
    });
    html += `</div>`;
  });

  // Show bonus skill resolvers for edges that grant "Any Combat" or "Any Skill"
  let needsResolve = [];
  C.edges.forEach(eid=>{
    let e = getEdgeById(eid);
    if(e && e.bonusSkill === 'Any Combat'){
      needsResolve.push({eid, type:'combat', label:e.name+' bonus skill'});
    }
    if(e && e.bonusSkill === 'Any Skill'){
      needsResolve.push({eid, type:'any', label:e.name+' bonus skill'});
    }
  });

  if(needsResolve.length){
    html += `<div class="sec">Resolve Bonus Skills</div>`;
    needsResolve.forEach(nr=>{
      let opts = nr.type==='combat' ? COMBAT_SKILLS : SKILLS;
      let cur = C._edgeSkillResolve && C._edgeSkillResolve[nr.eid] || '';
      html += `<div class="row"><div class="col"><label>${nr.label}</label>
        <select id="edgeSkill-${nr.eid}" onchange="setEdgeSkillResolve('${nr.eid}',this.value)">
          <option value="">— choose —</option>
          ${opts.map(s=>`<option value="${s}" ${cur===s?'selected':''}>${s}</option>`).join('')}
        </select></div></div>`;
    });
  }

  html += `<div class="note" style="margin-top:8px;">Selected: ${C.edges.length}/${nEdges}</div>`;
  html += nav();
  el.innerHTML = html;
}

function toggleEdge(id){
  let idx = C.edges.indexOf(id);
  if(idx >= 0){
    C.edges.splice(idx, 1);
  } else {
    let nEdges = edgeCount();
    // For repeatable edges (focused), allow multiple
    let e = getEdgeById(id);
    if(!e) return;
    if(!e.repeatable && C.edges.includes(id)) return;
    if(C.edges.length >= nEdges && !e.repeatable) return;
    if(C.edges.length >= nEdges + 2) return; // hard cap
    C.edges.push(id);
  }
  render();
}

function setEdgeSkillResolve(eid, val){
  if(!C._edgeSkillResolve) C._edgeSkillResolve = {};
  C._edgeSkillResolve[eid] = val;
}

function saveStep3(){
  // Apply edge bonus skills
  C.edges.forEach(eid=>{
    let e = getEdgeById(eid);
    if(!e) return;
    if(e.bonusSkill){
      let sk = e.bonusSkill;
      if(sk === 'Any Combat' || sk === 'Any Skill'){
        sk = (C._edgeSkillResolve && C._edgeSkillResolve[eid]) || (sk==='Any Combat'?'Punch':'Survive');
      }
      grantSkill(sk, e.name+' edge bonus');
    }
  });

  // Apply prodigy
  let pa = document.getElementById('prodigyAttr');
  if(pa) C.prodigyAttr = pa.value;
}

// ── STEP 4: FOCI ─────────────────────────────────────────────

function renderStep4(el){
  let nPicks = focusPicks();
  let html = `<div class="sec">Step 4 — Foci (${nPicks} pick${nPicks>1?'s':''})</div>
  <div class="desc">Pick ${nPicks} Focus level${nPicks>1?'s':''}. You may take level 2 of a Focus if you already have level 1.</div>`;

  // Show current picks
  if(C.foci.length > 0){
    html += `<div style="margin-bottom:10px;">`;
    C.foci.forEach((f,i)=>{
      let focus = getFocusById(f.id);
      html += `<div class="fb"><span class="fn">${focus?focus.name:'?'} ${f.level}</span>
        <button class="roll-btn" style="float:right;" onclick="removeFocus(${i})">Remove</button>
        <div class="fd">${focus?focus.desc:''}</div></div>`;
    });
    html += `</div>`;
  }

  // List all foci for picking
  if(C.foci.length < nPicks){
    html += `<div class="pick-grid">`;
    FOCI.forEach(focus=>{
      let existing = C.foci.find(f=>f.id===focus.id);
      let curLevel = existing ? existing.level : 0;
      let nextLevel = curLevel + 1;
      let canPick = nextLevel <= focus.levels;
      let dis = !canPick ? 'disabled' : '';

      html += `<div class="pick-card ${dis}" onclick="${canPick?`addFocus('${focus.id}',${nextLevel})`:''}">
        <div class="pname">${focus.name} ${canPick?'(Level '+nextLevel+')':''}</div>
        <div class="pdesc">${focus.desc}${focus.bonusSkill?'<br><span class="skill-tag">Bonus: '+focus.bonusSkill+'</span>':''}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Bonus skill resolvers for foci
  let needsResolve = [];
  C.foci.forEach((f,i)=>{
    let focus = getFocusById(f.id);
    if(!focus) return;
    if(focus.bonusSkill === 'Any Combat'){
      needsResolve.push({idx:i, fid:f.id, type:'combat', label:focus.name+' bonus skill'});
    }
    if(focus.bonusSkill === 'Any Skill'){
      needsResolve.push({idx:i, fid:f.id, type:'any', label:focus.name+' bonus skill'});
    }
  });
  if(needsResolve.length){
    html += `<div class="sec">Resolve Focus Bonus Skills</div>`;
    needsResolve.forEach(nr=>{
      let opts = nr.type==='combat' ? COMBAT_SKILLS : SKILLS;
      let cur = C._fociSkillResolve && C._fociSkillResolve[nr.fid] || '';
      html += `<div class="row"><div class="col"><label>${nr.label}</label>
        <select id="fociSkill-${nr.fid}" onchange="setFociSkillResolve('${nr.fid}',this.value)">
          <option value="">— choose —</option>
          ${opts.map(s=>`<option value="${s}" ${cur===s?'selected':''}>${s}</option>`).join('')}
        </select></div></div>`;
    });
  }

  html += `<div class="note">Picks used: ${C.foci.length}/${nPicks}</div>`;
  html += nav();
  el.innerHTML = html;
}

function addFocus(id, level){
  let existing = C.foci.find(f=>f.id===id);
  if(existing){
    existing.level = level;
  } else {
    C.foci.push({id, level});
  }
  render();
}

function removeFocus(idx){
  C.foci.splice(idx, 1);
  render();
}

function setFociSkillResolve(fid, val){
  if(!C._fociSkillResolve) C._fociSkillResolve = {};
  C._fociSkillResolve[fid] = val;
}

function saveStep4(){
  C.foci.forEach(f=>{
    let focus = getFocusById(f.id);
    if(!focus) return;
    if(focus.bonusSkill && f.level >= 1){
      let sk = focus.bonusSkill;
      if(sk === 'Any Combat' || sk === 'Any Skill'){
        sk = (C._fociSkillResolve && C._fociSkillResolve[f.id]) || (sk==='Any Combat'?'Punch':'Survive');
      }
      grantSkill(sk, focus.name+' focus bonus');
    }
    if(focus.bonusSkill2 && f.level >= 1){
      grantSkill(focus.bonusSkill2, focus.name+' focus bonus');
    }
  });
}

// ── STEP 5: FINAL TOUCHES ────────────────────────────────────

function rollEquip3(){

  for(let i=0;i<3;i++){

function saveStep5(){

}

// ── STEP 6: SUMMARY & EXPORT ────────────────────────────────

function renderStep6(el){
  // Compute derived stats
  let hp = getHP();
  C._hp = hp;
  let atkBonus = getAtkBonus();
  let htk = C.edges.includes('hardtokill');
  let conMod = getMod('CON');

  let evas = getEvasionSave();

  // Edges
  html += `<div class="sec">Edges</div>`;
  C.edges.forEach(eid=>{
    let e = getEdgeById(eid);

    let extra = '';

  html += `<div class="sec">Foci</div>`;
  C.foci.forEach(f=>{
    let focus = getFocusById(f.id);

  </div>`;

    <div class="sbox"><label>Physical</label><span class="sval">${phys.target-phys.mod}+</span><span class="smod">${phys.mod?modStr(phys.mod):''}</span></div>
    <div class="sbox"><label>Evasion</label><span class="sval">${evas.target-evas.mod}+</span><span class="smod">${evas.mod?modStr(evas.mod):''}</span></div>

  html += `<div class="sec">Skills</div>

  // Skill origins
  html += `<div class="sec">Skill Origins</div>
  <div class="fb" style="font-size:11px;line-height:1.8;">`;

function getAC(){
  // Check equipment for armor
  let ac = 10 + getMod('DEX');
  let equips = getEquipmentList();
  equips.forEach(e=>{
    if(e.ac && e.ac > ac) ac = e.ac;
  });
  return ac;
}

function getEquipmentList(){
  let items = [];
  // Clothing
  items.push({name:'Clothing appropriate to climate', note:'worn'});
  // Melee weapon
  if(C.meleeWeapon === 'bow'){
    items.push({name:'Primitive bow', note:'ready, enc 1'});
    items.push({name:'20 arrows', note:'enc 1'});
  } else if(C.meleeWeapon !== ''){
    let w = MELEE_WEAPONS[parseInt(C.meleeWeapon)];
    if(w) items.push({name:w.name+' (primitive)', note:'ready, enc '+w.enc});
  }
  items.push({name:'Knife', note:'enc 1'});
  items.push({name:'Backpack', note:'enc 1'});
  items.push({name:'Sleeping bag', note:'enc 1'});
  items.push({name:'Tinderbox', note:'*'});
  items.push({name:'3 torches', note:'enc 1 ea'});
  items.push({name:(C._foodDays||1)+' days food & water', note:'enc 1 ea'});

  // Campaign equipment
  if(C.equipMethod==='pick' && C.equipPick!==''){
    let item = EQUIP_TABLE[parseInt(C.equipPick)];
    if(item) items.push({name:item.name, note:'enc '+item.enc, ac:item.ac});
  } else if(C.equipMethod==='roll' && C.equipRolls && C.equipRolls.length){
    C.equipRolls.forEach(r=>{
      let item = EQUIP_TABLE[r];
      if(item) items.push({name:item.name, note:'enc '+item.enc, ac:item.ac});
    });
  }

  return items;
}

function rerollHP(){
  C._hp = getHP();
  render();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  let bg = C.bgIndex >= 0 ? BACKGROUNDS[C.bgIndex] : {name:'Unknown'};
  let hp = C._hp || getHP();
  let atkBonus = getAtkBonus();
  let htk = C.edges.includes('hardtokill');
  let conMod = getMod('CON');
  let hitDie = htk ? `1d6+${2+conMod}` : (conMod!==0 ? `1d6${modStr(conMod)}` : '1d6');
  let traumaTarget = htk ? 7 : 6;
  let maxStrain = getMaxStrain();
  let ac = getAC();
  let encR = getEncReadied();
  let encS = getEncStowed();

  let phys = getPhysSave();
  let evas = getEvasionSave();
  let ment = getMentalSave();

  let edgeNames = C.edges.map(eid=>{
    let e = getEdgeById(eid);
    let extra = eid==='prodigy' ? ' ('+ATTR_NAMES[C.prodigyAttr]+')' : '';
    return e ? e.name+extra : eid;
  });

  // Build weapon blocks
  let meleeBlock = '';
  let rangedBlock = '';
  let weaponGearBlocks = '';

  // Check for unarmed combatant
  let unarmedLvl = 0;
  C.foci.forEach(f=>{if(f.id==='unarmed')unarmedLvl=f.level;});
  let punchLvl = getSkillLevel('Punch');

  if(unarmedLvl >= 1){
    let dmgDie = punchLvl <= 0 ? '1d6' : punchLvl===1 ? '1d8' : punchLvl===2 ? '1d10' : punchLvl===3 ? '1d12' : '1d12+1';
    let strMod = getMod('STR');
    let dmgBonus = strMod + Math.max(0, punchLvl);
    let shock = punchLvl >= 1 ? `${punchLvl + strMod} / AC 15` : 'None';
    let toHit = atkBonus + strMod + punchLvl;
    meleeBlock = `<div class="fb">
            <span class="fn">Unarmed</span>
            <div class="fd">
              Dmg: ${dmgDie}+${dmgBonus} (STR${modStr(strMod)}, Punch+${punchLvl})<br>

  rangedBlock = `<div class="fb"><span class="fn">None</span><div class="fd">No ranged weapon</div></div>`;
  // Check for ranged weapons in equipment
  let equips = getEquipmentList();
  equips.forEach(e=>{
    if(e.name.includes('Sixgun')){
      let shootLvl = getSkillLevel('Shoot');
      let dexMod = getMod('DEX');
      let toHit = atkBonus + dexMod + shootLvl;
      rangedBlock = `<div class="fb"><span class="fn">Sixgun</span>
        <div class="fd">Dmg: 1d8 &middot; Ammo: 6/12 rounds<br>Range: Medium (30m) / Long (100m)<br>To-hit: ${modStr(toHit)} &middot; Skill: Shoot-${shootLvl}</div></div>`;
      weaponGearBlocks += `<div class="fb"><span class="fn">Sixgun</span>
        <div class="fd">1d8 dmg &middot; 12 rounds &middot; Enc 1 &middot; Skill: Shoot-${shootLvl}</div></div>`;
    }
    if(e.name.includes('Powder rifle')){
      let shootLvl = getSkillLevel('Shoot');
      let dexMod = getMod('DEX');
      let toHit = atkBonus + dexMod + shootLvl;
      rangedBlock = `<div class="fb"><span class="fn">Powder Rifle</span>
        <div class="fd">Dmg: 1d10+2 &middot; Ammo: 1/5 rounds<br>Range: Long (100m) / V.Long (300m)<br>To-hit: ${modStr(toHit)} &middot; Skill: Shoot-${shootLvl}</div></div>`;
    }
    if(e.name.includes('Brush gun') || e.name.includes('shotgun')){
      let shootLvl = getSkillLevel('Shoot');
      let dexMod = getMod('DEX');
      let toHit = atkBonus + dexMod + shootLvl;
      rangedBlock = `<div class="fb"><span class="fn">${esc(e.name.split('+')[0].trim())}</span>
        <div class="fd">Dmg: 2d6 &middot; Ammo: 2/4 rounds<br>Range: Medium (30m)<br>To-hit: ${modStr(toHit)} &middot; Skill: Shoot-${shootLvl}</div></div>`;
    }
    if(e.name.includes('bow')){
      let shootLvl = getSkillLevel('Shoot');
      let dexMod = getMod('DEX');
      let toHit = atkBonus + dexMod + shootLvl;
      rangedBlock = `<div class="fb"><span class="fn">Primitive Bow</span>
        <div class="fd">Dmg: 1d6 &middot; Ammo: 20 arrows<br>Range: Medium (30m) / Long (100m)<br>To-hit: ${modStr(toHit)} &middot; Skill: Shoot-${shootLvl}</div></div>`;
    }
  });

  // Foci blocks
  let fociBlocks = '';
  C.foci.forEach(f=>{
    let focus = getFocusById(f.id);
    if(!focus) return;
    fociBlocks += `<div class="fb">
            <span class="fn">${esc(focus.name)} ${f.level}</span>
            <div class="fd">${esc(focus.desc).replace(/\\n/g,'<br>')}</div>
          </div>`;
  });

  // Edge detail blocks
  let edgeDetailBlocks = '';
  C.edges.forEach(eid=>{
    let e = getEdgeById(eid);
    if(!e) return;
    let extra = eid==='prodigy' ? ' ('+ATTR_NAMES[C.prodigyAttr]+')' : '';
    edgeDetailBlocks += `<div class="fb">
            <span class="fn">${esc(e.name)}${extra}</span>
            <div class="fd">${esc(e.desc)}</div>
          </div>`;
  });

  // Skill rows
  let skillRows = '';
  SKILLS.forEach(s=>{
    let lv = getSkillLevel(s);
    let cls = lv >= 1 ? 'sr r1' : lv === 0 ? 'sr r0' : 'sr';
    skillRows += `<div class="sl"><span class="sn">${s}</span><span class="${cls}">${lv}</span></div>\n`;
  });

  // Skill origins
  let originLines = C.skillOrigins.map(o=>esc(o)).join('<br>\n        ');

  // Gear rows
  let gearRows = '';
  equips.forEach(e=>{
    gearRows += `<div class="gi"><span class="gn">${esc(e.name)}</span><span class="ge">${esc(e.note)}</span></div>\n`;
  });

  // Armor description
  let armorDesc = 'none';
  let acNote = '';
  equips.forEach(e=>{
    if(e.ac){
      if(e.ac === 13){ armorDesc = 'leather'; acNote = ' (leather) (primitive)'; }
      if(e.ac === 15){ armorDesc = 'scrap mail'; acNote = ' (scrap mail) (primitive)'; }
    }
  });

  let sheet = `

<script>
function showTab(name,btn){
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
function makeTrack(id,count,cls){
  const el=document.getElementById(id);
  if(!el)return;
  for(let i=0;i<count;i++){
    const b=document.createElement('div');
    b.className='tbox '+cls;
    b.dataset.i=i;
    b.addEventListener('click',function(){
      const all=el.querySelectorAll('.tbox');
      if(this.classList.contains('on')){
        for(let j=parseInt(this.dataset.i);j<all.length;j++)all[j].classList.remove('on');
      } else {
        for(let j=0;j<=parseInt(this.dataset.i);j++)all[j].classList.add('on');
      }
    });
    el.appendChild(b);
  }
}
makeTrack('hp',${hp},'hp');
makeTrack('stress',10,'st');
makeTrack('enc-r',${encR},'');
makeTrack('enc-s',${encS},'');
makeTrack('strain',${maxStrain},'');
<\/script>`;

  // Download
  let blob = new Blob([sheet], {type:'text/html'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  let filename = (C.name || 'character').toLowerCase().replace(/[^a-z0-9]+/g,'_') + '_character_sheet.html';
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
